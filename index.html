const calcDomainScores = (responses) => {
  if (!responses || !responses.length) return DOMAINS.map(d => ({domain:d, score:0}));
  return DOMAINS.map(domain => {
    const qIds = SURVEY_QUESTIONS.filter(q => q.domain === domain).map(q => q.id);
    const total = responses.reduce((sum, r) => {
      const items = r.answers.filter(a => qIds.includes(a.questionId));
      return sum + (items.reduce((s,a) => s+a.score, 0) / items.length);
    }, 0);
    return {domain, score: parseFloat((total / responses.length).toFixed(2))};
  });
};
const calcOrgIndex = (responses) => {
  if (!responses || !responses.length) return 0;
  const total = responses.reduce((sum,r) => sum + (r.answers.reduce((s,a)=>s+a.score,0)/r.answers.length), 0);
  return Math.round(((total/responses.length)/5)*100);
};
const calcTrend = (runIds) => runIds.map(id => {
  const run = DUMMY_SURVEY_RUNS.find(r => r.id === id);
  const res = DUMMY_RESPONSES[id] || [];
  const ds = calcDomainScores(res);
  const obj = {name:(run?.name||id).replace("調査","").replace("2024年","").trim(), index:calcOrgIndex(res)};
  DOMAINS.forEach((d,i) => { obj[d] = ds[i]?.score || 0; });
  return obj;
});

const Analysis = () => {
  const [analyzing, setAnalyzing] = useState(false);

  const avg = key => Math.round(allR.reduce((s,r)=>s+r.ai[key],0)/allR.length);

    const sr=allR.filter(r=>r.sessionId===s.id); if(!sr.length) return null;
    return{name:s.name,pos:Math.round(sr.reduce((s,r)=>s+r.ai.pos,0)/sr.length),agency:Math.round(sr.reduce((s,r)=>s+r.ai.agency,0)/sr.length),understanding:Math.round(sr.reduce((s,r)=>s+r.ai.understanding,0)/sr.length),practice:Math.round(sr.reduce((s,r)=>s+r.ai.practice,0)/sr.length)};
  }).filter(Boolean);
  const allKw=allR.flatMap(r=>r.ai.keywords);

          <Card key={k.l} className="p-5"><div className="flex items-center gap-2 mb-2"><span className="text-xl">{k.i}</span><span className="text-xs text-gray-500 font-medium">{k.l}</span></div><div className="text-3xl font-bold" style={{color:k.c}}>{k.v}<span className="text-sm text-gray-400 ml-0.5">点</span></div><div className="mt-2 w-full bg-gray-100 rounded-full h-1.5"><div className="h-1.5 rounded-full" style={{width:`${k.v}%`,backgroundColor:k.c}}/></div></Card>
        ))}
      </div>
      <div className="grid grid-cols-2 gap-6">
        <Card className="p-5"><h2 className="text-base font-bold text-gray-900 mb-4">WS別 感情傾向推移</h2>
          <ResponsiveContainer width="100%" height={240}><LineChart data={wsData}><CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6"/><XAxis dataKey="name" tick={{fontSize:9}}/><YAxis domain={[0,100]} tick={{fontSize:10}}/><Tooltip/><Legend iconType="circle" wrapperStyle={{fontSize:11}}/><Line type="monotone" dataKey="pos" name="ポジティブ" stroke="#3B82F6" strokeWidth={2} dot/><Line type="monotone" dataKey="agency" name="主体性" stroke="#8B5CF6" strokeWidth={2} dot/><Line type="monotone" dataKey="understanding" name="理解度" stroke="#10B981" strokeWidth={2} dot/><Line type="monotone" dataKey="practice" name="実践意欲" stroke="#F59E0B" strokeWidth={2} dot/></LineChart></ResponsiveContainer>
        </Card>
        <Card className="p-5"><h2 className="text-base font-bold text-gray-900 mb-4">頻出キーワード</h2>
          <div className="flex flex-wrap gap-2">
            {topKw.map(([kw,cnt],i)=>(

              </div>
            );

      </Card>

  );
};

          <div>
            <h2 className="text-base font-bold text-gray-900 mb-3 flex items-center gap-2"><span className="w-1 h-5 bg-amber-500 rounded-full block"/>今後の課題</h2>
            {improvements.slice(-3).reverse().map(i=>(
              <div key={i.domain} className="flex items-center gap-3 p-3 bg-amber-50 rounded-lg border border-amber-100 mb-2"><span className="text-amber-600 font-bold text-sm">{i.change<=0?"▼":"△"}{Math.abs(i.change)}</span><span className="text-sm text-gray-800 font-medium">{i.domain}</span></div>
            ))}
          </div>
        </div>
        <div>
          <h2 className="text-base font-bold text-gray-900 mb-3 flex items-center gap-2"><span className="w-1 h-5 bg-blue-600 rounded-full block"/>今後の推奨アクション</h2>
          {[{pri:"高",action:"主体性・自走力強化：現場判断の機会を増やす制度・仕組みの整備",c:"red"},{pri:"中",action:"対話文化定着：定例ミーティングへのファシリテーション組み込み",c:"yellow"},{pri:"中",action:"学習文化推進：定期的な振り返りと失敗共有の場の設置",c:"yellow"},{pri:"低",action:"ビジョン共有継続：四半期ごとの確認セッションの実施",c:"green"}].map((a,i)=>(
            <div key={i} className="flex items-start gap-3 p-3 border border-gray-100 rounded-lg mb-2"><span className={`text-xs font-bold px-1.5 py-0.5 rounded flex-shrink-0 ${a.c==="red"?"bg-red-100 text-red-600":a.c==="yellow"?"bg-yellow-100 text-yellow-700":"bg-green-100 text-green-700"}`}>{a.pri}</span><span className="text-sm text-gray-700">{a.action}</span></div>
          ))}
        </div>
        <div className="border-t border-gray-100 pt-4 text-xs text-gray-400 flex justify-between">
          <span>組織変革支援プラットフォーム</span><span>作成日: {new Date().toLocaleDateString("ja-JP")}</span>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// メインアプリ
// ============================================================
function App() {
  const [page, setPage] = useState("dashboard");
  const [companies, setCompanies] = useState(DUMMY_COMPANIES);
  const [projects, setProjects] = useState(DUMMY_PROJECTS);
  const [surveyRuns, setSurveyRuns] = useState(DUMMY_SURVEY_RUNS);
  const [selCompany, setSelCompany] = useState(null);
  const nav = (p) => { setPage(p); if(p!=="companies") setSelCompany(null); };

  const renderPage = () => {
    switch(page) {
      case "dashboard": return <Dashboard companies={companies} projects={projects} surveyRuns={surveyRuns} setPage={nav} setSelCompany={setSelCompany}/>;
      case "companies": return <Companies companies={companies} setCompanies={setCompanies} projects={projects} surveyRuns={surveyRuns} selId={selCompany} setSelId={setSelCompany}/>;
      case "projects": return (
        <div className="p-6">
          <h1 className="text-2xl font-bold text-gray-900 mb-5">プロジェクト管理</h1>
          {projects.map(p=>{
            const comp=companies.find(c=>c.id===p.companyId);
            return(<Card key={p.id} className="p-5 mb-4"><div className="flex items-center gap-2 mb-1"><h3 className="font-bold text-gray-900">{p.name}</h3><Badge label={p.phase}/></div><div className="text-sm text-gray-500">{comp?.name} | {p.department}</div><div className="text-xs text-gray-400 mt-1">{p.startDate} 〜 {p.endDate}</div></Card>);
          })}
        </div>
      );
      case "surveys": return <Surveys surveyRuns={surveyRuns} setSurveyRuns={setSurveyRuns} projects={projects} companies={companies}/>;
      case "workshops": return <Workshops/>;
      case "analysis": return <Analysis/>;
      case "reports": return <Report companies={companies} projects={projects} surveyRuns={surveyRuns}/>;
      default: return null;
    }
  };

  return (
    <div className="flex min-h-screen bg-gray-50">
      <Sidebar page={page} setPage={nav}/>
      <main className="flex-1 overflow-y-auto">{renderPage()}</main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
